name: Deploy Frontend to EC2

on:
  push:
    branches: [ "main", "master", "dev" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/plan-lector-frontend:latest
      - name: Fetch Backend Private IP
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          PRIVATE_IP=$(ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST_BACKEND }} "hostname -I | awk '{print \$1}'")
          echo "BACKEND_PRIVATE_IP=$PRIVATE_IP" >> $GITHUB_ENV

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        env:
          BACKEND_PRIVATE_IP: ${{ env.BACKEND_PRIVATE_IP }}
        with:
          host: ${{ secrets.EC2_HOST_FRONTEND }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BACKEND_PRIVATE_IP
          script: |
            # Ensure Docker is installed and running
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker ubuntu
              sudo systemctl enable docker
              sudo systemctl start docker
            fi
            
            # Free up space
            sudo docker system prune -f
            
            # Pull latest frontend image
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/plan-lector-frontend:latest
            
            # Restart container with reliability flags
            sudo docker stop frontend-app || true
            sudo docker rm frontend-app || true
            
            sudo docker run -d \
              --name frontend-app \
              --restart always \
              -e BACKEND_INTERNAL_IP=$BACKEND_PRIVATE_IP \
              -p 80:80 \
              -p 443:443 \
              -v /etc/letsencrypt:/etc/letsencrypt:ro \
              ${{ secrets.DOCKERHUB_USERNAME }}/plan-lector-frontend:latest
