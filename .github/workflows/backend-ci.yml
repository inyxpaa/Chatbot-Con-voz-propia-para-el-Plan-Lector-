name: Deploy Backend to EC2

on:
  push:
    branches: [ "main", "master", "dev" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/plan-lector-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_BACKEND }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker ubuntu
            fi
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/plan-lector-backend:latest
            sudo docker stop backend-app || true
            sudo docker rm backend-app || true
            sudo docker run -d --name backend-app -p 8000:8000 \
              --restart unless-stopped \
              -e MODEL_PROVIDER=local \
              -e LOCAL_MODEL_PATH=/modelo/qwen_finetuned \
              -e CHROMA_DB_PATH=/app/datalake/datalake/artifacts/chroma_db \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
              -e MAX_NEW_TOKENS=256 \
              -e MODEL_TIMEOUT_S=60 \
              -v /home/ubuntu/modelo/qwen_finetuned:/modelo/qwen_finetuned:ro \
              -v /home/ubuntu/chroma_db:/app/datalake/datalake/artifacts/chroma_db:ro \
              ${{ secrets.DOCKERHUB_USERNAME }}/plan-lector-backend:latest
